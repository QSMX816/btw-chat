name: release

# 打 tag（v1.0.4 等）时自动在 linux/windows/macOS 三个 runner 上分别构建，
# 然后把所有产物汇到一个 GitHub Release。也可在 Actions 页面手动运行。
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            cmd: npm run dist:linux
          - name: windows
            os: windows-latest
            cmd: npm run dist
          - name: macos
            os: macos-latest
            cmd: npm run dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build & package
        run: ${{ matrix.cmd }}
        env:
          # 没有开发者证书时跳过签名/公证；有证书时可注入 CSC_* 密钥启用
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # 不在此处注入 GH_TOKEN：避免 electron-builder 在构建期自动发布，
          # 改由下方 release job 统一创建/上传 Release（确定性，无竞态）。

      # Windows：nsis 之外再打一个便携 zip
      - name: Portable zip (windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $ver = (node -p "require('./package.json').version")
          Compress-Archive -Path release\win-unpacked\* -DestinationPath "release\BTW-Chat-$ver-windows-x64-portable.zip" -Force

      # Linux：electron-builder 出 x86_64/amd64，统一归一化为 x64
      - name: Normalize linux artifact names
        if: matrix.name == 'linux'
        shell: bash
        run: |
          cd release
          for f in BTW-Chat-*-linux-x86_64.* BTW-Chat-*-linux-amd64.*; do
            [ -e "$f" ] || continue
            n=$(echo "$f" | sed -E 's/-(x86_64|amd64)\./-x64./')
            [ "$f" != "$n" ] && mv "$f" "$n"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          if-no-files-found: error
          path: |
            release/BTW-Chat-*-linux-x64.deb
            release/BTW-Chat-*-linux-x64.AppImage
            release/BTW-Chat-*-linux-x64.tar.gz
            release/BTW-Chat-*-windows-x64.exe
            release/BTW-Chat-*-windows-x64-portable.zip
            release/BTW-Chat-*-mac-x64.dmg
            release/BTW-Chat-*-mac-arm64.dmg

  build-android:
    name: build (android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        # 用进程替换喂 yes 应答 license；Actions 默认 bash -eo pipefail，
        # `yes |` 收尾时 yes 会被 SIGPIPE(141) 拖垮管道，故改用 < <(yes)。
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" < <(yes)

      - name: Install web deps
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        working-directory: mobile/android
        shell: bash
        run: |
          ver=$(node -p "require('../package.json').version")
          cp app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/BTW-Chat-${ver}-android.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-android
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/BTW-Chat-*-android.apk

  release:
    name: publish release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "Publishing $tag with assets:"
          ls -lh artifacts/
          gh release create "$tag" artifacts/* \
            --title "BTW Chat ${tag}" \
            --generate-notes \
            --verify-tag \
            || gh release upload "$tag" artifacts/* --clobber
